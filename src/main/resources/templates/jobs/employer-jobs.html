<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Οι Αγγελίες μου | Διαχείριση</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-title {
            color: white;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .job-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.95);
            height: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .job-image {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background-color: #f8f9fa;
        }

        .card-body {
            padding: 20px;
        }

        .job-title {
            color: #1A494D;
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 5px;
        }

        .company-name {
            color: #6c757d;
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 15px;
        }

        .pay-badge {
            background-color: #1A494D;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
        }

        .btn-edit {
            background-color: #1A494D;
            color: white;
            border: none;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            padding: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-edit:hover {
            background-color: #14383a;
            color: #fff;
            transform: scale(1.02);
        }

        .empty-state {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            margin: 100px auto;
        }
    </style>
</head>
<body>

<div th:if="${param.success}" class="alert alert-success mt-3 text-center shadow-sm" role="alert">
    <strong>Επιτυχία!</strong> Η αγγελία ενημερώθηκε σωστά.
</div>

<div class="container-fluid">
    <h1 class="main-title">Οι Αγγελιες μου</h1>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:if="${not #lists.isEmpty(employerJobs)}">

        <div th:each="job : ${employerJobs}" class="col">
            <div class="card job-card">

                <img th:src="@{'/images/' + ${job.imageUrl}}"
                     class="job-image"
                     alt="Job Image"
                     onerror="this.src='https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=500';">

                <div class="card-body">
                    <h3 class="job-title" th:text="${job.title}">Τίτλος</h3>
                    <span class="company-name" th:text="'🏢 ' + ${job.company.name}">Εταιρεία</span>

                    <div class="mb-2">
                        <small class="text-muted">📍 Τοποθεσία: </small>
                        <strong th:text="${job.city}">Πόλη</strong>
                    </div>

                    <div class="pay-badge">
                        <span th:text="${job.hourlyRate}">0</span>€ / ώρα
                    </div>

                    <p class="card-text text-muted small mt-3"
                       th:text="${#strings.abbreviate(job.description, 80)}">
                        Σύντομη περιγραφή...
                    </p>

                    <a th:href="@{/jobs/edit/{id}(id=${job.id})}" class="btn-edit">
                        ✏️ Επεξεργασία Αγγελίας
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(employerJobs)}" class="empty-state shadow">
        <h2 class="text-dark mb-3">Δεν έχετε δημοσιεύσει αγγελίες ακόμα.</h2>
        <p class="text-muted">Ξεκινήστε τώρα δημιουργώντας την πρώτη σας θέση εργασίας!</p>
        <div class="d-flex gap-2 justify-content-center mt-4">
            <a th:href="@{/jobs/post}" class="btn btn-primary btn-lg px-4">Δημιουργία Αγγελίας</a>
            <a th:href="@{/home}" class="btn btn-outline-secondary btn-lg px-4">Επιστροφή</a>
        </div>
    </div>

</div>
<script>
    // Περιμένουμε να φορτώσει η σελίδα
    document.addEventListener("DOMContentLoaded", function() {
        const alert = document.querySelector('.alert-success');
        if (alert) {
            // 1. Μετά από 3000ms (3 δευτερόλεπτα) ξεκίνα να το κρύβεις
            setTimeout(() => {
                alert.style.transition = "opacity 0.5s ease";
                alert.style.opacity = "0";

                // 2. Μετά το εφέ (500ms), αφαίρεσε το τελείως από το DOM
                setTimeout(() => {
                    alert.remove();

                    // 3. ΠΡΟΑΙΡΕΤΙΚΑ: Καθάρισε το URL από το ?success=updated
                    if (window.history.replaceState) {
                        const url = window.location.protocol + "//" + window.location.host + window.location.pathname;
                        window.history.replaceState({path: url}, '', url);
                    }
                }, 500);
            }, 3000);
        }
    });
</script>

</body>
</html>
