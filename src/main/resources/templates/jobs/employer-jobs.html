<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Οι Αγγελίες μου | Διαχείριση</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        /* --- ΒΑΣΙΚΟ LAYOUT --- */
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .brand-name {
            color: #1A494D;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        /* --- ΠΕΡΙΕΧΟΜΕΝΟ ΣΕΛΙΔΑΣ --- */
        .main-content {
            padding: 60px 20px;
            flex-grow: 1;
        }

        .main-title {
            color: white;
            font-weight: 800;
            text-align: center;
            margin-bottom: 50px;
            font-size: 2.8rem;
            /*text-transform: uppercase;*/
            letter-spacing: 2px;
        }

        /* --- CARDS --- */
        .job-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.98);
            height: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .job-card:hover {
            transform: translateY(-8px);
        }
        /*.job-image {*/
        /*    width: 100%;*/
        /*    height: 200px;*/
        /*    object-fit: contain;*/
        /*    background-color: #f8f9fa;*/
        /*    padding: 10px;*/
        /*    border-bottom: 1px solid #eee;*/
        /*}*/

        .job-image {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Άλλαξα σε cover για πιο Pro look */
            background-color: #f8f9fa;
        }

        .job-title {
            color: #1A494D;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .pay-badge {
            background-color: #1A494D;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
        }

        .btn-edit {
            background-color: #1A494D;
            color: white;
            border: none;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
            padding: 12px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-edit:hover {
            background-color: #14383a;
            color: white;
        }

        .empty-state {
            background: white;
            padding: 60px;
            border-radius: 25px;
            text-align: center;
            max-width: 650px;
            margin: 50px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
    </style>
</head>


<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-content">

    <div th:if="${successMessage}"
         class="alert alert-success text-center shadow-sm mb-4"
         role="alert"
         style="max-width: 700px;
                margin: 20px auto;
                border-radius: 15px;">

        <i class="bi bi-check-circle-fill me-2"></i>

        <span th:text="${successMessage}"></span>

    </div>

    <div class="container">

        <h1 class="main-title"
            th:text="#{employer.jobs.title}">
            My Job Posts
        </h1>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
             th:if="${not #lists.isEmpty(employerJobs)}">

            <div th:each="job : ${employerJobs}" class="col">

                <div class="card job-card">

                    <img th:src="@{'/uploads/images/' + ${job.imageUrl}}"
                         class="job-image"
                         alt="Job Image"
                         onerror="this.src='https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=500';">

                    <div class="card-body p-4">

                        <h3 class="job-title"
                            th:text="${job.title}">
                            Title
                        </h3>

                        <span class="company-name text-muted fw-bold d-block mb-3"
                              th:text="'🏢 ' + ${job.company.name}">
                            Company
                        </span>

                        <div class="mb-3">

                            <span class="badge bg-light text-dark border p-2">
                                📍 <span th:text="${job.city}">City</span>
                            </span>

                        </div>

                        <div class="pay-badge mb-3">

                            <span th:text="${job.hourlyRate}">0</span>

                            <span th:text="#{employer.jobs.perHour}">
                                € / hour
                            </span>

                        </div>

                        <p class="card-text text-muted small"
                           th:text="${#strings.abbreviate(job.description, 90)}">

                            Short description...

                        </p>

                        <a th:href="@{/jobs/edit/{id}(id=${job.id})}"
                           class="btn-edit"
                           th:text="#{employer.jobs.edit}">
                            Edit Job Post
                        </a>

                    </div>

                </div>

            </div>

            <!-- ADD NEW JOB -->

            <div class="col">

                <a th:href="@{/jobs/createNewJob}"
                   class="card job-card d-flex align-items-center justify-content-center text-decoration-none"
                   style="min-height: 100%;
                          border: 2px dashed #1A494D;
                          background: rgba(255,255,255,0.7);">

                    <div class="text-center">

                        <i class="bi bi-plus-lg fs-1 text-success"></i>

                        <p class="mt-2 fw-bold text-dark"
                           th:text="#{employer.jobs.new}">
                            New Job Post
                        </p>

                    </div>

                </a>

            </div>

        </div>

        <!-- EMPTY STATE -->

        <div th:if="${#lists.isEmpty(employerJobs)}"
             class="empty-state shadow">

            <h2 class="text-dark mb-3 fw-bold"
                th:text="#{employer.jobs.empty}">
                You have not published job posts yet.
            </h2>

            <p class="text-muted mb-4"
               th:text="#{employer.jobs.empty.subtitle}">
                Start now by creating your first job post!
            </p>

            <div class="d-grid gap-2 d-md-flex justify-content-center">

                <a th:href="@{/jobs/post}"
                   class="btn btn-primary btn-lg px-5 shadow-sm"
                   style="background-color: #1A494D;
                          border:none;
                          border-radius: 12px;"
                   th:text="#{employer.jobs.create}">
                    Create Job Post
                </a>

                <a th:href="@{/home}"
                   class="btn btn-outline-secondary btn-lg px-5"
                   style="border-radius: 12px;"
                   th:text="#{general.back}">
                    Back
                </a>

            </div>

        </div>

    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const alert = document.querySelector('.alert-success');
        if (alert) {
            setTimeout(() => {
                alert.style.transition = "all 0.6s ease";
                alert.style.opacity = "0";
                alert.style.transform = "translateY(-10px)";
                setTimeout(() => {
                    alert.remove();
                    if (window.history.replaceState) {
                        const url = window.location.protocol + "//" + window.location.host + window.location.pathname;
                        window.history.replaceState({path: url}, '', url);
                    }
                }, 600);
            }, 3500);
        }
    });

</script>

</body>
</html>
