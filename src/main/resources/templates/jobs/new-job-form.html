<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Επεξεργασία Θέσης Εργασίας</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    /* --- ΒΑΣΙΚΟ LAYOUT (Column για να μπει το Navbar πάνω) --- */
    body {
      background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
      url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column; /* NAVBAR ΠΑΝΩ, ΠΕΡΙΕΧΟΜΕΝΟ ΚΑΤΩ */
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    /* --- WRAPPER ΓΙΑ ΤΗ ΦΟΡΜΑ --- */
    .registration-wrapper {
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px; /* Περισσότερο padding για άνεση */
    }

    .registration-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 750px; /* Λίγο πιο φαρδύ για τα 2-column rows */
    }

    h2 { color: #1A494D; font-weight: 800; margin-bottom: 30px; text-align: center; }

    h3 {
      color: #1A494D;
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 25px;
      margin-bottom: 15px;
      border-left: 5px solid #1A494D;
      padding-left: 12px;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
      border: 1px solid #ced4da;
      transition: 0.3s;
    }

    .form-control:focus {
      border-color: #1A494D;
      box-shadow: 0 0 0 0.25rem rgba(26, 73, 77, 0.15);
    }

    .btn-submit {
      background-color: #1A494D;
      color: white;
      padding: 16px;
      font-weight: 700;
      border-radius: 12px;
      width: 100%;
      margin-top: 30px;
      transition: 0.3s;
      border: none;
      /*text-transform: uppercase;*/
      letter-spacing: 1px;
    }

    .btn-submit:hover {
      background-color: #143a3d;
      color: white !important;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .section-divider {
      height: 5px;
      background-color: #1A494D;
      margin: 30px 0;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(26, 73, 77, 0.4);
    }

    label { font-weight: 600; color: #495057; font-size: 0.9rem; margin-bottom: 6px; }

    @media (max-width: 991px) {
      .navbar-nav { text-align: center; padding: 20px 0; }
      .main-nav-link { margin: 10px 0; display: block; }
    }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="registration-wrapper">
  <div class="registration-container">

    <h2 th:text="#{job.edit.company}">
      Edit Employer Company
    </h2>

    <form th:action="@{/jobs/saveNewJob}"
          th:object="${registrationDto}"
          method="post"
          enctype="multipart/form-data">

      <input type="hidden" th:field="*{user.id}" />
      <input type="hidden" th:field="*{company.id}" />
      <input type="hidden" th:field="*{jobPosition.id}" />

      <!-- SECTION 1 -->

      <h3 th:text="#{job.section.company}">
        1. Company Information
      </h3>

      <div class="row">

        <div class="col-md-8 mb-3">

          <label th:text="#{job.company.name}">
            Company Name
          </label>

          <input type="text"
                 th:field="*{company.name}"
                 class="form-control"
                 th:placeholder="#{job.company.placeholder}"
                 readonly />
        </div>

        <div class="col-md-4 mb-3">

          <label th:text="#{job.company.afm}">
            VAT Number
          </label>

          <input type="text"
                 th:field="*{company.afm}"
                 class="form-control"
                 pattern="^[0-9]{9}$"
                 oninput="validate_afm(this,'errorAfm')"
                 th:placeholder="#{job.company.afm.placeholder}"
                 maxlength="9"
                 readonly />

          <span id="errorAfm" style="color:red;"></span>

        </div>

      </div>

      <div class="section-divider"></div>

      <!-- SECTION 2 -->

      <h3 th:text="#{job.section.position}">
        2. Job Position
      </h3>

      <div class="row">

        <div class="col-md-8 mb-3">

          <label th:text="#{job.title}">
            Job Title
          </label>

          <input type="text"
                 th:field="*{jobPosition.title}"
                 class="form-control"
                 maxlength="20"
                 pattern="^[\\p{L}\\s'-]{1,20}$"
                 oninput="validate_varchar_20(this,'errorTitle')"
                 th:placeholder="#{job.title.placeholder}"
                 required />

          <span id="errorTitle" style="color:red;"></span>

        </div>

        <div class="col-md-4 mb-3">

          <label th:text="#{job.hourlyRate}">
            Hourly Rate (€)
          </label>

          <input type="number"
                 th:field="*{jobPosition.hourlyRate}"
                 class="form-control"
                 placeholder="0.00"
                 step="0.1" />

        </div>

        <div class="col-md-12 mb-3">

          <label th:text="#{job.description}">
            Job Description
          </label>

          <textarea th:field="*{jobPosition.description}"
                    class="form-control"
                    rows="3"
                    maxlength="200"
                    oninput="validate_description(this,'errorDescription')"
                    th:placeholder="#{job.description.placeholder}">
                    </textarea>

          <span id="errorDescription" style="color:red;"></span>

        </div>

        <div class="col-md-12 mb-3">

          <label th:text="#{job.city}">
            Job City
          </label>

          <input type="text"
                 th:field="*{jobPosition.city}"
                 class="form-control"
                 th:placeholder="#{job.city.placeholder}" />

        </div>

      </div>

      <div class="section-divider"></div>

      <!-- SECTION 3 -->

      <h3 th:text="#{job.section.image}">
        3. Job / Company Image
      </h3>

      <div class="row">

        <div class="col-md-12 mb-3">

          <label th:text="#{job.image}">
            Job Image
          </label>

          <input type="file"
                 th:field="*{imageFile}"
                 class="form-control"
                 accept="image/*" />

          <div class="form-text"
               th:text="#{job.image.help}">
            Upload an image representing your company or position.
          </div>

          <div th:if="${registrationDto.jobPosition.imageUrl != null}"
               class="mt-2">

            <small class="text-muted"
                   th:text="#{job.image.current}">
              Current image:
            </small>

            <span class="badge bg-secondary"
                  th:text="${registrationDto.jobPosition.imageUrl}">
                            image.jpg
            </span>

          </div>

        </div>

      </div>

      <input type="hidden" th:field="*{jobPosition.imageUrl}" />

      <!-- BUTTONS -->

      <button type="submit"
              class="btn btn-submit shadow-sm"
              th:text="#{job.submit}">
        Update Account & Publish
      </button>

      <button type="button"
              class="btn btn-submit shadow-sm"
              onclick="window.location.href='/jobs/explore/employer'"
              th:text="#{job.cancel}">
        Cancel
      </button>

    </form>

  </div>
</div>


<script th:inline="javascript">

  function validate_varchar_20(input, errorSpanId) {

    const regex = /^[A-Za-zΑ-Ωα-ωΆΈΉΊΌΎΏάέήώόύί\s]{1,20}$/;
    const errorSpan = document.getElementById(errorSpanId);

    if (!regex.test(input.value)) {
      errorSpan.textContent =
              "Επιτρέπονται μόνο γράμματα και έως 20 χαρακτήρες.";
    } else {
      errorSpan.textContent = "";
    }
  }

  function validate_description(input, errorSpanId) {

    // Επιτρέπει:
    // - ελληνικά
    // - αγγλικά
    // - αριθμούς
    // - κενά
    // - βασικά σημεία στίξης
    // μέχρι 200 χαρακτήρες

    const regex = /^[A-Za-zΑ-Ωα-ωΆΈΉΊΌΎΏάέόώήύί0-9\s.,!;:()'"€%-]{1,200}$/;

    const errorSpan = document.getElementById(errorSpanId);

    if (!regex.test(input.value)) {
      errorSpan.textContent =
              "Επιτρέπονται έως 200 χαρακτήρες, γράμματα και αριθμοί.";
    } else {
      errorSpan.textContent = "";
    }
  }

  function validate_afm(input, errorSpanId) {

    // Ακριβώς 9 αριθμοί
    const regex = /^[0-9]{9}$/;

    const errorSpan = document.getElementById(errorSpanId);

    if (!regex.test(input.value)) {
      errorSpan.textContent =
              "Το ΑΦΜ πρέπει να περιέχει ακριβώς 9 ψηφία.";
    } else {
      errorSpan.textContent = "";
    }
  }

  function validate_certificate(input, errorSpanId) {

    const file = input.files[0];
    const errorSpan = document.getElementById(errorSpanId);

    if (!file) {
      errorSpan.textContent = "";
      return;
    }

    // Επιτρεπτοί τύποι
    const allowedTypes = [
      "application/pdf",
      "image/png",
      "image/jpeg",
      "image/jpg"
    ];

    // Μέγιστο μέγεθος 5MB
    const maxSize = 5 * 1024 * 1024;

    if (!allowedTypes.includes(file.type)) {
      errorSpan.textContent =
              "Επιτρέπονται μόνο PDF, PNG και JPG αρχεία.";

      input.value = "";
      return;
    }

    if (file.size > maxSize) {
      errorSpan.textContent =
              "Το αρχείο πρέπει να είναι μικρότερο από 5MB.";

      input.value = "";
      return;
    }

    errorSpan.textContent = "";
  }



</script>

</body>
</html>
