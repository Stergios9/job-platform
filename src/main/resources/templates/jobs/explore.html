<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Αναζήτηση Εργασίας - Crew Now</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-title {
            color: white;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Card Styling */
        .job-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.95);
            height: 100%; /* Για να έχουν όλες το ίδιο ύψος στο grid */
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .job-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .job-image {
            width: 100%;
            height: 200px;
            /* Επιλογή 1: contain - Δείχνει όλη την εικόνα, αλλά μπορεί να αφήσει κενά δεξιά-αριστερά */
            object-fit: contain;

            /* Προσθέτουμε ένα background color για να μη φαίνονται άσχημα τα κενά αν η φωτό είναι μικρή */
            background-color: #f8f9fa;

            transition: 0.5s;
        }

        .job-card:hover .job-image {
            transform: scale(1.05);
        }

        .card-body {
            padding: 20px;
        }

        .job-title {
            color: #1A494D;
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 10px;
        }

        .company-name {
            color: #6c757d;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: block;
        }

        .job-info {
            font-size: 0.9rem;
            color: #495057;
            margin-bottom: 5px;
        }

        .pay-badge {
            background-color: #1A494D;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }

        .btn-details {
            background-color: transparent;
            color: #1A494D;
            border: 2px solid #1A494D;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-details:hover {
            background-color: #1A494D;
            color: white;
        }

        .container-fluid {
            max-width: 1200px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <h1 class="main-title">Crew Now <span class="fs-4 d-block text-light opacity-75">Διαθέσιμες Θέσεις Εργασίας</span></h1>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

        <div th:each="job : ${allJobs}" class="col">
            <div class="card job-card">

                <a th:href="@{/jobs/details/{id}(id=${job.id})}">
                    <img th:src="@{'/images/' + ${job.imageUrl}}"
                         class="job-image"
                         alt="Job Image"
                         onerror="this.src='https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=500';">
                </a>

                <div class="card-body">
                    <h3 class="job-title" th:text="${job.title}">Job Title</h3>
                    <span class="company-name">
                        🏢 <span th:text="${job.getCompany().getName()}">Εταιρεία</span>
                    </span>

                    <div class="job-info">
                        📍 <strong>Τοποθεσία:</strong> <span th:text="${job.city}">Πόλη</span>
                    </div>

                    <p class="card-text text-muted small mt-2"
                       th:text="${#strings.abbreviate(job.description, 100)}">
                        Περιγραφή...
                    </p>

                    <div class="pay-badge">
                        <span th:text="${job.hourlyRate}">0</span>€ / ώρα
                    </div>

                    <a th:href="@{/jobs/details/{id}(id=${job.id})}" class="btn btn-details">
                        Προβολή Λεπτομερειών
                    </a>
                </div>
            </div>
        </div>

    </div> <div th:if="${#lists.isEmpty(allJobs)}" class="text-center mt-5">
    <div class="p-5 bg-white rounded-4 shadow">
        <h3 class="text-muted">Δεν βρέθηκαν διαθέσιμες θέσεις αυτή τη στιγμή.</h3>
        <a th:href="@{/}" class="btn btn-secondary mt-3">Επιστροφή</a>
    </div>
</div>
</div>

</body>
</html>
