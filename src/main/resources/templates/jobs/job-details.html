<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Crew Now - Λεπτομέρειες Θέσης</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Χρησιμοποιούμε το ίδιο στυλ με την αρχική σου */
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .content-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .details-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 800px; /* Λίγο πιο πλατύ για τις πληροφορίες */
        }

        .job-title {
            color: #1A494D;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .company-name {
            color: #6c757d;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: block;
        }

        .info-label {
            color: #1A494D;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #333;
        }

        .description-box {
            background: rgba(26, 73, 77, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #1A494D;
            margin: 20px 0;
            text-align: left;
            white-space: pre-line; /* Διατηρεί τις αλλαγές γραμμής της περιγραφής */
        }

        .hourly-rate {
            font-size: 1.5rem;
            color: #2a6f75;
            font-weight: 800;
        }

        .btn-action {
            background-color: #1A494D;
            color: white;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border: none;
        }

        .btn-action:hover {
            background-color: #143a3d;
            color: white;
            transform: translateY(-2px);
        }

        .btn-back {
            color: #6c757d;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .btn-back:hover {
            color: #1A494D;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="content-wrapper">
    <div class="details-container text-center">

        <div th:if="${job.imageUrl != null and !job.imageUrl.empty}" class="mb-4">
            <img th:src="@{'/images/' + ${job.imageUrl}}"
                 alt="Job Image"
                 class="img-fluid rounded-3 shadow"
                 style="max-height: 250px; width: 100%; object-fit: cover; border: 4px solid white;">
        </div>

        <div th:unless="${job.imageUrl != null and !job.imageUrl.empty}" class="mb-4">
            <div class="d-inline-block p-4 rounded-circle bg-light shadow-sm">
                <span style="font-size: 3rem;">💼</span>
            </div>
        </div>

        <div class="mb-4">
            <h1 class="job-title" th:text="${job.title}">Τίτλος Θέσης</h1>
            <span class="company-name" th:text="${job.company.name}">Όνομα Εταιρείας</span>
        </div>

        <div class="row text-start">
            <div class="col-md-6">
                <div class="info-label">📍 Τοποθεσία</div>
                <div class="info-value" th:text="${job.city}">Αθήνα</div>
            </div>
            <div class="col-md-6">
                <div class="info-label">💰 Ωριαία Αντιμισθία</div>
                <div class="info-value hourly-rate">
                    <span th:text="${job.hourlyRate}">0.00</span>€ / ώρα
                </div>
            </div>
        </div>

        <div class="info-label text-start">📝 Περιγραφή Θέσης</div>
        <div class="description-box" th:text="${job.description}">
            Εδώ θα εμφανίζεται η περιγραφή της θέσης εργασίας...
        </div>

        <div class="mt-4 pt-3 border-top">
            <div class="info-label">📧 Στοιχεία Επικοινωνίας</div>
            <p class="info-value" th:text="${job.company.user.email}">email@company.com</p>
        </div>

        <div class="mt-5 d-flex justify-content-between align-items-center">
            <a href="javascript:history.back()" class="btn-back">← Επιστροφή</a>

            <div sec:authorize="hasRole('WORKER')">
                <a href="#" class="btn-action">Υποβολή Ενδιαφέροντος</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
