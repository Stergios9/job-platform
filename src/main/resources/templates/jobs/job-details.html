<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Λεπτομέρειες Θέσης - Crew Now</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            /* ΣΗΜΑΝΤΙΚΟ: Flex column για να μπει το navbar ΠΑΝΩ και το περιεχόμενο ΚΑΤΩ */
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Εξασφαλίζουμε ότι η εικόνα έχει ΠΑΝΤΑ το ίδιο ύψος και δεν παραμορφώνεται */
        .job-image {
            width: 100%;
            height: 220px;
            object-fit: cover; /* Αυτό κόβει την εικόνα για να γεμίσει το πλαίσιο χωρίς να την ξεχειλώσει */
            display: block;
        }

        /* Κλειδώνουμε το card-body ώστε να επεκτείνεται */
        .card-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* Αν θες να είναι απόλυτα στοιχισμένα τα "κουτάκια" στο κέντρο της σελίδας */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Padding για το περιεχόμενο κάτω από το navbar */
        .main-content {
            padding: 40px 20px;
            flex-grow: 1;
        }

        .main-title {
            color: white;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }


        .job-title {
            color: #1A494D;
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-content">

    <div th:if="${param.success}" class="alert alert-success text-center shadow-sm mb-4" role="alert" style="max-width: 800px; margin: 0 auto;">
        <strong>Επιτυχία!</strong> Η αγγελία ενημερώθηκε σωστά.
    </div>

    <div class="container">
        <h1 class="main-title">Οι Αγγελίες μου</h1>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 justify-content-center">
            <div th:each="job : ${allJobs}" class="col d-flex align-items-stretch">
                <div class="card job-card w-100"> <a th:href="@{/jobs/details/{id}(id=${job.id})}" class="d-block">
                    <img th:src="@{'/images/' + ${job.imageUrl}}"
                         class="job-image"
                         alt="Job Image"
                         onerror="this.src='https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=500';">
                </a>

                    <div class="card-body d-flex flex-column">
                        <h3 class="job-title" th:text="${job.title}">Job Title</h3>
                        <span class="company-name">
                    <i class="bi bi-building"></i> <span th:text="${job.company.name}">Εταιρεία</span>
                </span>

                        <div class="text-muted mb-3">
                            <i class="bi bi-geo-alt-fill text-danger"></i>
                            <strong th:text="${job.city}">Πόλη</strong>
                        </div>

                        <p class="card-text text-secondary small mb-4" th:text="${#strings.abbreviate(job.description, 100)}">
                            Περιγραφή...
                        </p>

                        <div class="mt-auto">
                            <div class="pay-badge mb-3">
                                <span th:text="${job.hourlyRate}">0</span>€ / ώρα
                            </div>

                            <a th:href="@{/jobs/details/{id}(id=${job.id})}" class="btn btn-details">
                                Προβολή Λεπτομερειών
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(employerJobs)}" class="empty-state shadow">
            <h2 class="text-dark mb-3">Δεν έχετε δημοσιεύσει αγγελίες ακόμα.</h2>
            <p class="text-muted">Ξεκινήστε τώρα δημιουργώντας την πρώτη σας θέση εργασίας!</p>
            <div class="d-flex gap-2 justify-content-center mt-4">
                <a th:href="@{/jobs/post}" class="btn btn-primary btn-lg px-4" style="background-color: #1A494D; border:none;">Δημιουργία Αγγελίας</a>
                <a th:href="@{/home}" class="btn btn-outline-secondary btn-lg px-4">Επιστροφή</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
