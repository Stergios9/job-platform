<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Εγγραφή Εργοδότη - Job Portal</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
      url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0; /* Λίγο περιθώριο πάνω-κάτω για scroll σε μικρές οθόνες */
      font-family: 'Segoe UI', sans-serif;
    }

    .registration-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 700px; /* Πιο φαρδύ για να χωράνε τα πεδία */
    }

    h2 { color: #1A494D; font-weight: 800; margin-bottom: 30px; text-align: center; }

    h3 {
      color: #1A494D;
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 25px;
      margin-bottom: 15px;
      border-left: 4px solid #1A494D;
      padding-left: 10px;
    }

    .form-control, .form-select {
      border-radius: 8px;
      padding: 10px 15px;
      border: 1px solid #ced4da;
      margin-bottom: 5px;
    }

    .form-control:focus {
      border-color: #1A494D;
      box-shadow: 0 0 0 0.25rem rgba(26, 73, 77, 0.25);
    }

    .btn-submit {
      background-color: #1A494D;
      color: white;
      padding: 15px;
      font-weight: 600;
      border-radius: 10px;
      width: 100%;
      margin-top: 30px;
      transition: 0.3s;
      border: none;
    }

    .btn-submit:hover {
      background-color: #143a3d;
      transform: translateY(-2px);
      color: white;
    }

    .section-divider {
      height: 1px;
      background-color: #dee2e6;
      margin: 20px 0;
    }

    label { font-weight: 500; color: #495057; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="registration-container">
  <h2>Δημιουργία Λογαριασμού Εργοδότη</h2>

  <form th:action="@{/user/register/employer}" th:object="${registrationDto}" method="post">

    <h3>1. Στοιχεία Λογαριασμού</h3>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Email / Username</label>
        <input type="text" th:field="*{user.username}" class="form-control" placeholder="π.χ. info@company.com" required />
      </div>
      <div class="col-md-6 mb-3">
        <label>Κωδικός Πρόσβασης</label>
        <input autocomplete="new-password" type="password" th:field="*{user.password}" class="form-control" placeholder="********" required />
      </div>
      <div class="col-md-12 mb-3">
        <label>Πόλη (Έδρα χρήστη)</label>
        <input type="text" th:field="*{user.city}" class="form-control" placeholder="π.χ. Αθήνα" />
      </div>
      <input type="hidden" th:field="*{user.role}" value="ROLE_EMPLOYER" />
    </div>

    <div class="section-divider"></div>

    <h3>2. Στοιχεία Επιχείρησης</h3>
    <div class="row">
      <div class="col-md-8 mb-3">
        <label>Επωνυμία Επιχείρησης</label>
        <input type="text" th:field="*{company.name}" class="form-control" placeholder="π.χ. Acropolis Catering" required />
      </div>
      <div class="col-md-4 mb-3">
        <label>ΑΦΜ</label>
        <input type="text" th:field="*{company.afm}" class="form-control" placeholder="9 ψηφία" maxlength="9" required />
      </div>
    </div>

    <div class="section-divider"></div>

    <h3>3. Θέση Εργασίας</h3>
    <div class="row">
      <div class="col-md-8 mb-3">
        <label>Τίτλος Θέσης</label>
        <input type="text" th:field="*{jobPosition.title}" class="form-control" placeholder="π.χ. Σερβιτόρος Α'" required />
      </div>
      <div class="col-md-4 mb-3">
        <label>Ωρομίσθιο (€)</label>
        <input type="number" th:field="*{jobPosition.hourlyRate}" class="form-control" placeholder="0.00" step="0.1" />
      </div>
      <div class="col-md-12 mb-3">
        <label>Περιγραφή καθηκόντων</label>
        <textarea th:field="*{jobPosition.description}" class="form-control" rows="3" placeholder="Περιγράψτε τι ζητάτε από τον εργαζόμενο..."></textarea>
      </div>
      <div class="col-md-12 mb-3">
        <label>Πόλη Εργασίας</label>
        <input type="text" th:field="*{jobPosition.city}" class="form-control" placeholder="Τοποθεσία εργασίας" />
      </div>
    </div>

    <button type="submit" class="btn btn-submit shadow-sm">Δημιουργία Λογαριασμού & Ανάρτηση</button>

    <div class="text-center mt-3">
      <a th:href="@{/login}" class="text-decoration-none text-muted small">Έχετε ήδη λογαριασμό; Σύνδεση</a>
    </div>
  </form>
</div>

</body>
</html>
