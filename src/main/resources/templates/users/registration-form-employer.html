<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Εγγραφή Εργοδότη - Job Portal</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    /* --- ΒΑΣΙΚΟ LAYOUT (Column για να μπει το Navbar πάνω) --- */
    body {
      background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
      url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column; /* NAVBAR ΠΑΝΩ, ΠΕΡΙΕΧΟΜΕΝΟ ΚΑΤΩ */
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    /* --- WRAPPER ΓΙΑ ΤΗ ΦΟΡΜΑ --- */
    .registration-wrapper {
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px; /* Περισσότερο padding για άνεση */
    }

    .registration-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 750px; /* Λίγο πιο φαρδύ για τα 2-column rows */
    }

    h2 { color: #1A494D; font-weight: 800; margin-bottom: 30px; text-align: center; }

    h3 {
      color: #1A494D;
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 25px;
      margin-bottom: 15px;
      border-left: 5px solid #1A494D;
      padding-left: 12px;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
      border: 1px solid #ced4da;
      transition: 0.3s;
    }

    .form-control:focus {
      border-color: #1A494D;
      box-shadow: 0 0 0 0.25rem rgba(26, 73, 77, 0.15);
    }

    .btn-submit {
      background-color: #1A494D;
      color: white;
      padding: 16px;
      font-weight: 700;
      border-radius: 12px;
      width: 100%;
      margin-top: 30px;
      transition: 0.3s;
      border: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-submit:hover {
      background-color: #143a3d;
      color: white !important;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .section-divider {
      height: 5px;
      background-color: #1A494D;
      margin: 30px 0;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(26, 73, 77, 0.4);
    }

    label { font-weight: 600; color: #495057; font-size: 0.9rem; margin-bottom: 6px; }

    @media (max-width: 991px) {
      .navbar-nav { text-align: center; padding: 20px 0; }
      .main-nav-link { margin: 10px 0; display: block; }
    }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="registration-wrapper">
  <div class="registration-container">
    <h2 th:text="${isEdit} ? 'Επεξεργασια Αγγελιας' : 'Δημιουργια Λογαριασμου Εργοδοτη'">Δημιουργία Λογαριασμού Εργοδότη</h2>

    <form th:action="${isEdit ? '/jobs/update' : '/company/register/employer'}"
          th:object="${registrationDto}" method="post"
          enctype="multipart/form-data">

      <input type="hidden" th:field="*{user.id}" />
      <input type="hidden" th:field="*{company.id}" />
      <input type="hidden" th:field="*{jobPosition.id}" />
      <input type="hidden" th:field="*{user.username}" />
      <input type="hidden" th:field="*{user.password}" />
      <input type="hidden" th:field="*{company.afm}" />

      <h3>1. Θέση Εργασίας</h3>

      <div class="row">
        <div class="col-md-8 mb-3">
          <label>Τίτλος Θέσης</label>
          <input type="text"
                 th:field="*{jobPosition.title}"
                 class="form-control"
                 maxlength="20"
                 pattern="^[A-Za-zΑ-Ωα-ωΆΈΉΊΌΎΏάέήί\s]{1,20}$"
                 oninput="validate_varchar_20(this,'errorTitle')"
                 placeholder="π.χ. Σερβιτόρος Α'"
                 required />

          <span id="errorTitle" style="color:red;"></span>
        </div>

        <div class="col-md-4 mb-3">
          <label>Ωρομίσθιο (€)</label>
          <input type="number" th:field="*{jobPosition.hourlyRate}"
                 class="form-control"
                 placeholder="0.00"
                 step="0.1" />
        </div>

        <div class="col-md-12 mb-3">
          <label>Περιγραφή καθηκόντων</label>

          <textarea th:field="*{jobPosition.description}"
                    class="form-control"
                    rows="3"
                    maxlength="200"
                    oninput="validate_description(this,'errorDescription')"
                    placeholder="Περιγράψτε τι ζητάτε από τον εργαζόμενο...">
          </textarea>

          <span id="errorDescription" style="color:red;"></span>

        </div>

        <div class="col-md-12 mb-3">
          <label>Πόλη Εργασίας</label>
          <input type="text" th:field="*{jobPosition.city}"
                 class="form-control"
                 placeholder="Τοποθεσία εργασίας" />
        </div>
<!--        <input type="hidden" th:field="*{jobPosition.imageUrl}" />-->
      </div>

      <div class="section-divider"></div>

      <h3>2. Εικόνα Αγγελίας / Επιχείρησης</h3>
      <div class="row">
        <div class="col-md-12 mb-3">
          <label>Φωτογραφία Αγγελίας</label>
          <input type="file" th:field="*{imageFile}"
                 class="form-control"
                 accept="image/*" />

          <div class="form-text">Ανεβάστε μια φωτογραφία που αντιπροσωπεύει τη θέση εργασίας ή την επιχείρησή σας.</div>

          <div th:if="${isEdit and registrationDto.jobPosition.imageUrl != null}" class="mt-2">
            <small class="text-muted">Τρέχουσα εικόνα: </small>
            <span class="badge bg-secondary" th:text="${registrationDto.jobPosition.imageUrl}">image.jpg</span>
          </div>
        </div>
      </div>

      <input type="hidden" th:if="${isEdit}" th:field="*{jobPosition.imageUrl}" />

      <button type="submit" class="btn btn-submit shadow-sm"
              th:text="${isEdit} ? 'Αποθήκευση Αλλαγών' : 'Δημιουργία Λογαριασμού & Ανάρτηση'">
        Δημιουργία Λογαριασμού & Ανάρτηση
      </button>

      <div class="text-center mt-4">
        <a th:href="${isEdit} ? '/jobs/explore/employer' : '/login'"
           class="text-decoration-none text-muted fw-bold"
           th:text="${isEdit} ? '← Ακύρωση και Επιστροφή' : 'Έχετε ήδη λογαριασμό; Σύνδεση'">
          Σύνδεση
        </a>
      </div>
    </form>
  </div>
</div>

<script th:inline="javascript">

  function validate_varchar_20(input, errorSpanId) {

    const regex = /^[A-Za-zΑ-Ωα-ωΆΈΉΊΌΎΏάέήί\s]{1,20}$/;
    const errorSpan = document.getElementById(errorSpanId);

    if (!regex.test(input.value)) {
      errorSpan.textContent =
              "Επιτρέπονται μόνο γράμματα και έως 20 χαρακτήρες.";
    } else {
      errorSpan.textContent = "";
    }
  }

  function validate_description(input, errorSpanId) {

    // Επιτρέπει:
    // - ελληνικά
    // - αγγλικά
    // - αριθμούς
    // - κενά
    // - βασικά σημεία στίξης
    // μέχρι 200 χαρακτήρες

    const regex = /^[A-Za-zΑ-Ωα-ωΆΈΉΊΌΎΏάέήί0-9\s.,!;:()'"€%-]{1,200}$/;

    const errorSpan = document.getElementById(errorSpanId);

    if (!regex.test(input.value)) {
      errorSpan.textContent =
              "Επιτρέπονται έως 200 χαρακτήρες, γράμματα και αριθμοί.";
    } else {
      errorSpan.textContent = "";
    }
  }

</script>

</body>
</html>
