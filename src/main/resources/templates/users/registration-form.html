<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Εγγραφή Χρήστη - Crew Now</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .registration-card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            color: #1A494D;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .role-badge {
            background-color: #1A494D;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            vertical-align: middle;
        }

        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #1A494D;
            box-shadow: 0 0 0 0.25rem rgba(26, 73, 77, 0.15);
        }

        .btn-submit {
            background-color: #1A494D;
            color: white;
            padding: 14px;
            font-weight: 700;
            border-radius: 10px;
            width: 100%;
            border: none;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background-color: #143a3d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .error-banner {
            background-color: #f8d7da;
            color: #842029;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #f5c2c7;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1A494D;
            margin: 25px 0 15px 0;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dee2e6;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="registration-card">
    <div th:if="${errorMessage}" class="error-banner">
        <span th:text="${errorMessage}"></span>
    </div>

    <h2>
        Εγγραφή <br>
        <span class="role-badge" th:text="${user.role == 'ROLE_WORKER' ? 'Εργαζόμενος' : 'Εργοδότης'}"></span>
    </h2>

    <form th:action="@{/user/register}" th:object="${user}" method="post">

        <input type="hidden" th:field="*{role}" />

        <div class="mb-3">
            <label class="form-label">Username / Email</label>
            <input type="text" th:field="*{username}" class="form-control" placeholder="Επιλέξτε όνομα χρήστη" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Κωδικός Πρόσβασης</label>
            <input autocomplete="new-password" type="password" th:field="*{password}" class="form-control" placeholder="********" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Πόλη Διαμονής</label>
            <input type="text" th:field="*{city}" class="form-control" placeholder="π.χ. Θεσσαλονίκη" />
        </div>

        <div th:if="*{role == 'ROLE_EMPLOYER'}">
            <div class="section-title">Στοιχεία Επιχείρησης</div>

            <div class="mb-3">
                <label class="form-label">Όνομα Επιχείρησης</label>
                <input type="text" name="companyName" class="form-control" placeholder="π.χ. Tech Solutions" required />
            </div>

            <div class="mb-3">
                <label class="form-label">ΑΦΜ Επιχείρησης</label>
                <input type="text" name="afm" class="form-control" placeholder="9-ψήφιος αριθμός" maxlength="9" required />
            </div>
        </div>

        <button type="submit" class="btn btn-submit shadow-sm mt-3">
            Ολοκλήρωση Εγγραφής
        </button>
    </form>

    <div class="text-center mt-4 pt-3 border-top">
        <p class="text-muted small">
            Έχετε ήδη λογαριασμό;
            <a th:href="@{/}" class="text-decoration-none fw-bold" style="color: #1A494D;">Σύνδεση εδώ</a>
        </p>
    </div>
</div>

</body>
</html>
