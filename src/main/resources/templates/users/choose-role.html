<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Επιλογή Ρόλου - Job Portal</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      /* Χρησιμοποιούμε την ίδια εικόνα φόντου για ομοιομορφία */
      background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
      url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .role-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h2 {
      color: #1A494D;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .btn-role {
      display: block;
      width: 100%;
      padding: 20px;
      margin-bottom: 15px;
      font-size: 1.2rem;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      border-radius: 10px;
      border: 2px solid transparent;
    }

    /* Στυλ για τον Εργαζόμενο */
    .worker {
      background-color: #1A494D;
      color: white;
    }

    .worker:hover {
      background-color: #143a3d;
      transform: translateY(-3px);
      box-shadow: 0px 5px 15px rgba(26, 73, 77, 0.4);
      color: white;
    }

    /* Στυλ για τον Εργοδότη */
    .employer {
      background-color: #ffffff;
      color: #1A494D;
      border: 2px solid #1A494D;
    }

    .employer:hover {
      background-color: #f8f9fa;
      transform: translateY(-3px);
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
      color: #143a3d;
    }

    .subtitle {
      color: #6c757d;
      margin-bottom: 25px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<div class="role-container">
  <h2>Καλώς ήρθατε!</h2>
  <p class="subtitle">Επιλέξτε πώς θέλετε να χρησιμοποιήσετε την εφαρμογή</p>

  <div class="d-grid gap-2">
    <a th:href="@{/user/register/details(role='ROLE_WORKER')}" class="btn-role worker">
      <div class="mb-1">🔍 Ψάχνω για δουλειά</div>
      <small style="font-weight: 400; font-size: 0.8rem; opacity: 0.9;">Βρείτε θέσεις ως σερβιτόρος, αποθηκάριος κ.α.</small>
    </a>

    <a th:href="@{/user/register/details(role='ROLE_EMPLOYER')}" class="btn-role employer">
      <div class="mb-1">💼 Ψάχνω για υπάλληλο</div>
      <small style="font-weight: 400; font-size: 0.8rem; opacity: 0.9;">Δημοσιεύστε θέσεις εργασίας για την επιχείρησή σας</small>
    </a>
  </div>

  <div class="mt-4">
    <a th:href="@{/login}" class="text-decoration-none" style="color: #6c757d; font-size: 0.9rem;">
      Επιστροφή στην είσοδο
    </a>
  </div>
</div>

</body>
</html>
