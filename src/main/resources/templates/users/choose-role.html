<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Επιλογή Ρόλου</title>
  <style>
    .btn { padding: 15px 25px; margin: 10px; cursor: pointer; display: inline-block; text-decoration: none; color: white; border-radius: 5px; }
    .worker { background-color: #1A494D; }
    .employer { background-color: #2c3e50; }
  </style>
</head>
<body>
<h2>Καλώς ήρθατε! Ποιος είναι ο σκοπός σας;</h2>

<a th:href="@{/user/register/details(role='ROLE_WORKER')}" class="btn worker">Ψάχνω για δουλειά</a>

<a th:href="@{/user/register/details(role='ROLE_EMPLOYER')}" class="btn employer">Ψάχνω για υπάλληλο</a>
</body>
</html>
