<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crew Now - Αρχική</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .welcome-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .brand-name {
            color: #1A494D;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .welcome-text {
            color: #6c757d;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .user-highlight {
            color: #1A494D;
            font-weight: 700;
            border-bottom: 2px solid #1A494D;
        }

        .btn-explore {
            background-color: #1A494D;
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: none;
            width: 100%;
        }

        .btn-explore:hover {
            background-color: #143a3d;
            transform: translateY(-3px);
            box-shadow: 0px 8px 20px rgba(26, 73, 77, 0.3);
            color: white;
        }

        .nav-link-custom {
            color: #1A494D;
            text-decoration: none;
            font-weight: 500;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="welcome-container shadow-lg">
    <h1 class="brand-name">Crew Now</h1>

    <p class="welcome-text">
        Γεια σου, <span class="user-highlight" th:text="${user}">Επισκέπτη</span>!<br>
        Η επόμενη επαγγελματική σου ευκαιρία σε περιμένει.
    </p>

    <div class="mt-4">
        <form th:action="@{/jobs/explore}" method="get">
            <button type="submit" class="btn btn-explore">
                🔍 Αναζήτηση Θέσεων Εργασίας
            </button>
        </form>
    </div>
<!--    <div th:if="${#authorization.expression('hasRole(''ROLE_EMPLOYER'')')}"></div>-->
        <div class="mt-4" >
            <!--        <a th:href="@{/jobs/details/{id}(id=${job.id})}">-->
            <form th:action="@{/jobs/explore/employer}" method="get">
                <button type="submit" class="btn btn-explore">
                    🔍 Δες τις Αγγελίες σου
                </button>
            </form>
        </div>



    <div class="mt-4 border-top pt-3">
        <p class="small text-muted">Είσαι εργοδότης; Διαχειρίσου τις αγγελίες σου από το προφίλ σου.</p>
    </div>
</div>

</body>
</html>
