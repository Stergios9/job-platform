<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Portal Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            /* Αντικατάστησε το URL με τη δική σου εικόνα */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.95); /* Ημιδιαφανές λευκό για να φαίνεται το background */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .error { color: #dc3545; font-size: 0.9em; margin-bottom: 15px; text-align: center; }

        .form-control { margin-bottom: 15px; }

        .btn-custom {
            background-color: #1A494D;
            color: white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #143a3d;
            color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1 class="text-center mb-4" style="color: #1A494D;">Crew Now</h1>

    <div th:if="${param.error}" class="error border border-danger p-2 rounded">
        Invalid username or password.
    </div>

    <form th:action="@{/login}" method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Εισάγετε όνομα χρήστη" required autofocus>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Εισάγετε κωδικό" required>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-custom py-2">Login</button>
            <a th:href="@{/user/signUp}" class="btn btn-outline-secondary py-2">Sign up</a>
        </div>
    </form>
</div>

<script>
    if (window.history.replaceState) {
        const url = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({path: url}, '', url);
    }
</script>

</body>
</html>
