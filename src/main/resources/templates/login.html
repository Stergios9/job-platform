<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .login-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        .error { color: red; margin-bottom: 10px; }
        input { width: 90%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; cursor: pointer; }
        .register-link { margin-top: 15px; text-align: center; display: block; text-decoration: none; color: blue; }
    </style>
</head>
<body>
<div class="login-container">
    <h1>Login</h1>

    <div th:if="${param.error}" class="error">
        Invalid username or password.
    </div>

    <br>
    <form th:action="@{/login}" method="POST">

        <input autocomplete="new-username" type="text" name="username" placeholder="Username" required>
        <br><br>

        <input autocomplete="new-password" type="password" name="password" placeholder="Password" required>
        <br><br>

        <button type="submit" style="background-color: #1A494D; color: white;">Login</button>

    </form>
    <br>
    <div>
        <a th:href="@{/user/signUp}" style="background-color: #1A494D; color: white;">Sign up</a>
    </div>

</div>
</body>
</html>
