<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Είσοδος - Crew Now</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* --- ΒΑΣΙΚΟ LAYOUT --- */
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
            url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Για ομοιομορφία με τις άλλες σελίδες */
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- WRAPPER ΓΙΑ ΚΕΝΤΡΑΡΙΣΜΑ --- */
        .login-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            transition: transform 0.3s ease;
        }

        .brand-title {
            color: #1A494D;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .login-subtitle {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* --- FORM STYLING --- */
        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #1A494D;
            box-shadow: 0 0 0 0.25rem rgba(26, 73, 77, 0.15);
        }

        .btn-login {
            background-color: #1A494D;
            color: white;
            padding: 12px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background-color: #143a3d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .btn-signup {
            border: 2px solid #1A494D;
            color: #1A494D;
            padding: 10px;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-signup:hover {
            background-color: #f8f9fa;
            color: #143a3d;
            border-color: #143a3d;
        }

        .error-msg {
            background-color: #fff2f2;
            color: #d93025;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #d93025;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-container">
        <div class="text-center">
            <h1 class="brand-title">Crew Now</h1>
            <p class="login-subtitle">Καλώς ορίσατε στην πύλη εργασίας σας</p>
        </div>

        <div th:if="${param.error}" class="error-msg">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Λάθος όνομα χρήστη ή κωδικός πρόσβασης.
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Το όνομα χρήστη σας" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Ο κωδικός σας" required>
            </div>

            <div class="d-grid gap-3">
                <button type="submit" class="btn btn-login shadow-sm">Είσοδος</button>

                <div class="position-relative my-2">
                    <hr class="text-muted">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">ή</span>
                </div>

                <a th:href="@{/user/signUp}" class="btn btn-signup">Δημιουργία Λογαριασμού</a>
            </div>
        </form>

    </div>
</div>

<script>
    // Καθαρισμός του URL από το ?error
    if (window.history.replaceState) {
        const url = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({path: url}, '', url);
    }
</script>

</body>
</html>
