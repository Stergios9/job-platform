<!DOCTYPE html>
<html lang="el" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    <a class="navbar-brand brand-logo" th:href="@{/home}">
      CREW<span style="color: #52c41a; font-weight: 300;">NOW</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"
            style="border: none; outline: none;">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-center">

        <li class="nav-item dropdown me-3">
          <a class="nav-link dropdown-toggle text-white d-flex align-items-center" href="#" id="settingsDropdown"
             role="button" data-bs-toggle="dropdown" aria-expanded="false" style="font-size: 1.1rem;">
            <i class="bi bi-person-circle me-2" style="color: #52c41a; font-size: 1.4rem;"></i>
            <span class="fw-bold" sec:authentication="name">Username</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="settingsDropdown">
            <li>
              <h6 class="dropdown-header">Διαχείριση</h6>
            </li>
            <li>
              <a class="dropdown-item" th:href="@{/user/settings}">
                <i class="bi bi-gear-fill me-2 text-secondary"></i> Ρυθμίσεις Λογαριασμού
              </a>
            </li>
            <li sec:authorize="hasRole('ROLE_WORKER')">
              <a class="dropdown-item" th:href="@{/worker/profile}">
                <i class="bi bi-person-vcard-fill me-2 text-secondary"></i> Το Προφίλ μου
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/logout}" method="post" class="px-3 py-1">
                <button type="submit" class="btn btn-danger btn-sm w-100 text-start">
                  <i class="bi bi-box-arrow-right me-2"></i> Αποσύνδεση
                </button>
              </form>
            </li>
          </ul>
        </li>

        <li class="nav-item">
          <a th:href="@{/home}" class="nav-link main-nav-link">
            <i class="bi bi-house-door me-1"></i> Αρχική
          </a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYER')">
          <a th:href="@{/jobs/explore/employer}" class="nav-link main-nav-link">
            <i class="bi bi-briefcase me-1"></i> Οι Αγγελίες μου
          </a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ROLE_WORKER')">
          <a th:href="@{/jobs/explore}" class="nav-link main-nav-link">
            <i class="bi bi-search me-1"></i> Αναζήτηση
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>

</body>
</html>
