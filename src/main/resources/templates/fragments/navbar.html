<!DOCTYPE html>
<html lang="el" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    <a class="navbar-brand brand-logo" th:href="@{/home}">
      CREW<span style="color: #52c41a; font-weight: 300;">NOW</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"
            style="border: none; outline: none;">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-center">

          <li class="nav-item d-flex align-items-center me-3">
            <span class="text-white d-flex align-items-center" style="font-size: 1.3rem;">
            <i class="bi bi-person-circle me-2" style="color: #52c41a;"></i>
            <span>Γεια σου, </span>
            <span class="fw-bold ms-1" style="font-size: 1.3rem; letter-spacing: 0.5px;" sec:authentication="name">Username</span>
            </span>
        </li>


        <li class="nav-item">
          <a th:href="@{/home}" class="nav-link main-nav-link">
            <i class="bi bi-house-door me-1"></i>
            <span class="fw-bold ms-1" style="font-size: 1.3rem; letter-spacing: 0.5px;">Αρχική</span>
          </a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYER')">
          <a th:href="@{/jobs/explore/employer}" class="nav-link main-nav-link">
            <span class="fw-bold ms-1" style="font-size: 1.0rem; letter-spacing: 0.5px;"> Οι Αγγελίες μου </span>
            <i class="bi bi-briefcase me-1"></i>
          </a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ROLE_WORKER')">
          <span class="fw-bold ms-1" style="font-size: 1.0rem; letter-spacing: 0.5px;"> Αναζήτηση </span>
          <a th:href="@{/jobs/explore}" class="nav-link main-nav-link">
            <i class="bi bi-search me-1"></i> Αναζήτηση
          </a>
        </li>

        <li class="nav-item ms-lg-4">

          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn-logout-link">
              <i class="bi bi-box-arrow-right me-1"></i>
              <span class="fw-bold ms-1" style="font-size: 1.2rem;">Αποσύνδεση</span>
            </button>
          </form>
        </li>


      </ul>
    </div>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
