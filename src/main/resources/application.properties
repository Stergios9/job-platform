spring.application.name=library
server.port=8080
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

#spring.datasource.username=springstudent
#spring.datasource.password=springstudent
spring.datasource.username=root
spring.datasource.password=root


# Replace 'your_db_name' with your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# spring security
#spring.security.user.name=admin
#spring.security.user.password=password123

# 1. if i want to use DataInitializer for creating new data i use 'update'
#spring.jpa.hibernate.ddl-auto=update

# 2. if i want to use import.sql for creating new data i use 'create'
spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 1. This tells Spring to find and run 'data.sql' or 'import.sql'
#spring.sql.init.mode=always

# 2. This ensures the script runs AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true

# 3. If your file is named import.sql, you might need to specify it:
#spring.sql.init.data-locations=classpath:import.sql

# Use the generic dialect for Hibernate 6/7
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
